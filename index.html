:root{--bg:#04180f;--gold:#d7b45a;--paper:#fffdf6;--grid:#d8d0bd;--p:#1974df;--b:#dc3f43;--t:#26985a;--panel:rgba(0,0,0,.30);--muted:#c9d5ce}*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}body{padding:max(env(safe-area-inset-top),6px) max(env(safe-area-inset-right),6px) max(env(safe-area-inset-bottom),6px) max(env(safe-area-inset-left),6px);background:radial-gradient(circle at 20% 0,rgba(29,122,74,.42),transparent 38%),linear-gradient(160deg,#073f28,var(--bg) 72%)}button{touch-action:manipulation}.app{width:100%;max-width:1280px;margin:auto}.topbar{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:6px;margin-bottom:6px}.logo{color:var(--gold);font-size:18px;font-weight:900;white-space:nowrap}.stats{display:flex;gap:4px;justify-content:flex-end}.stat{min-width:54px;padding:5px;text-align:center;background:var(--panel);border:1px solid var(--gold);border-radius:9px}.stat small{display:block;font-size:7px;color:#d6dfda}.stat b{font-size:14px}.stat.p b{color:var(--p)}.stat.b b{color:var(--b)}.stat.t b{color:var(--t)}.layout{display:grid;grid-template-columns:1fr;gap:7px}.left,.right{min-width:0}.road-title{display:flex;justify-content:space-between;align-items:center;color:var(--gold);font-weight:800;font-size:11px;margin:0 2px 4px}.road-wrap{width:100%;overflow-x:auto;overflow-y:hidden;border:2px solid var(--gold);border-radius:12px;background:var(--paper);-webkit-overflow-scrolling:touch}.road{display:grid;grid-template-rows:repeat(6,35px);grid-auto-columns:35px;min-width:100%;width:max-content;background:linear-gradient(to right,transparent 34px,var(--grid) 34px,var(--grid) 35px) 0 0/35px 35px,linear-gradient(to bottom,transparent 34px,var(--grid) 34px,var(--grid) 35px) 0 0/35px 35px,var(--paper)}.cell{width:35px;height:35px;display:flex;align-items:center;justify-content:center;positio adding-top:3px}.recent{margin-top:3px;padding:6px;border:1px solid rgba(215,180,90,.65);border-radius:9px;background:rgba(0,0,0,.22)}.recent-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}.recent-title{color:var(--gold);font-weight:800;font-size:10px}.shoe{color:#c9d5ce;font-size:9px}.sequence{display:flex;gap:3px;overflow-x:auto}.seq{min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900}.seq.p{background:var(--p)}.seq.b{background:var(--b)}.seq.t{background:var(--t)}.footer{text-align:center;color:#8fa096;font-size:8px;padding-top:3px}
@media (orientation:landscape) and (max-height:520px){html,body{height:100%;overflow:hidden}body{padding:4px max(env(safe-area-inset-right),6px) 4px max(env(safe-area-inset-left),6px)}.app{height:100%;max-width:none;display:grid;grid-template-rows:36px minmax(0,1fr)}.topbar{height:36px;margin:0 0 4px}.logo{font-size:16px}.stat{min-width:50px;padding:3px 4px}.stat small{font-size:6px}.stat b{font-size:12px}.layout{min-height:0;height:100%;grid-template-columns:minmax(0,62%) minmax(0,38%);gap:6px;overflow:hidden}.left{display:grid;grid-template-rows:18px minmax(0,1fr) 48px;min-height:0}.right{display:grid;grid-template-rows:minmax(0,1fr) 42px 16px 58px 11px;gap:4px;min-height:0;overflow:hidden}.road-title{font-size:10px;margin:0 2px 2px}.road-wrap{min-height:0;height:100%;overflow-x:auto;overflow-y:hidden}.road{grid-template-rows:repeat(6,40px);grid-auto-columns:40px;background:linear-gradient(to right,transparent 39px,var(--grid) 39px,var(--grid) 40px) 0 0/40px 40px,linear-gradient(to bottom,transparent 39px,var(--grid) 39px,var(--grid) 40px) 0 0/40px 40px,var(--paper)}.cell{width:40px;height:40px}.mark{width:30px;height:30px;font-size:13px}.empty{height:240px}.info{margin-top:4px;height:48px;gap:4px}.info-box{min-height:48px}.info-box small{font-size:7px}.info-box b{font-size:12px}.buttons{height:100%;gap:5px}.result{min-height:0;height:100%;border-radius:12px;font-size:11px}.result span{font-size:26px}.tools{height:42px;margin:0;gap:5px}.tool{padding:5px 2px;font-size:9px}.notice{min-height:16px;padding:0;font-size:9px}.recent{height:58px;margin:0;padding:5px;overflow:hidden}.recent-head{margin-bottom:3px}.sequence{height:24px}.footer{padding:0;font-size:7px}}

</style></head><body><div class="app"><header class="topbar"><div class="logo">JH Baccarat Road</div><div class="stats"><div class="stat p"><small>PLAYER</small><b id="pCount">0</b></div><div class="stat b"><small>BANKER</small><b id="bCount">0</b></div><div class="stat t"><small>TIE</small><b id="tCount">0</b></div><div class="stat"><small>ALL</small><b id="total">0</b></div></div></header><main class="layout"><section class="left"><div class="road-title"><span>BIG ROAD</span><span id="gameNo">GAME 0</span></div><div class="road-wrap" id="roadWrap"><div class="empty" id="empty">PLAYER / BANKER / TIE를 눌러주세요</div><div class="road" id="road" style="display:none"></div></div><div class="info"><div class="info-box"><small>현재 연속</small><b id="currentStreak">-</b></div><div class="info-box"><small>최대 연속</small><b id="maxStreak">-</b></div><div class="info-box"><small>PLAYER 승률</small><b id="pRate">0%</b></div><div class="info-box"><small>BANKER 승률</small><b id="bRate">0%</b></div></div></section><section class="right"><div class="buttons"><button class="result p" id="btnP"><span>P</span>PLAYER</button><button class="result b" id="btnB"><span>B</span>BANKER</button><button class="result t" id="btnT"><span>T</span>TIE</button></div><div class="tools"><button class="tool" id="undo">↩ 실행취소</button><button class="tool" id="newShoe">🎴 NEW SHOE</button><button class="tool" id="clear">🗑 전체 삭제</button></div><div class="notice" id="notice"></div><div class="recent"><div class="recent-head"><div class="recent-title">최근 기록</div><div class="shoe" id="shoeLabel">SHOE 1</div></div><div class="sequence" id="sequence"></div></div><div class="footer">Version 3.0 · 자동 저장</div></section></main></div><script>
(function(){const $=id=>document.getElementById(id),KEY='jhBaccaratRoadV3';let state={results:[],shoe:1,archive:[]},clearArmed=false,clearTimer=null,shoeArmed=false,shoeTimer=null;function load(){try{const s=JSON.parse(localStorage.getItem(KEY)||'null');if(s&&Array.isArray(s.results)){state=s;return}for(const key of ['jhBaccaraRoadV21','jhBaccaraRoadV2','jhBaccaratRoadV1']){const o=JSON.parse(localStorage.getItem(key)||'null');if(o&&Array.isArray(o.results)){state={results:o.results.filter(x=>x==='P'||x==='B'||x==='T'),shoe:Number(o.shoe)||1,archive:Array.isArray(o.archive)?o.archive:[]};break}}}catch(e){}}function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}function buildRoad(){const cells=[],occ=new Set();let col=0,row=0,last=null,pendingTie=0;for(const value of state.results){if(value==='T'){if(cells.length)cells[cells.length-1].ties++;else pendingTie++;continue}if(last===null){col=0;row=0}else if(value===last){if(row<5&&!occ.has(col+','+(row+1)))row++;else{col++;while(occ.has(col+','+row))col++}}else{col++;row=0;while(occ.has(col+','+row))col++}cells.push({value,col,row,ties:pendingTie});pendingTie=0;occ.add(col+','+row);last=value}return cells}function streakInfo(){const base=state.results.filter(x=>x!=='T');if(!base.length)return{current:'-',max:'-'};let current=1,max=1,maxValue=base[0],run=1;for(let i=1;i<base.length;i++){run=base[i]===base[i-1]?run+1:1;if(run>max){max=run;maxValue=base[i]}}for(let i=base.length-1;i>0&&base[i]===base[i-1];i--)current++;return{current:base[base.length-1]+' '+current,max:maxValue+' '+max}}function resetClear(){clearArmed=false;$('clear').classList.remove('armed');$('clear').textContent='🗑 전체 삭제'}function resetShoe(){shoeArmed=false;$('newShoe').classList.remove('shoe-armed');$('newShoe').textContent='🎴 NEW SHOE'}function render(){const r=state.results,pc=r.filter(x=>x==='P').length,bc=r.filter(x=>x==='B').length,tc=r.filter(x=>x==='T').length,dec=pc+bc;$('pCount').textContent=pc;$('bCount').textContent=bc;$('tCount').textContent=tc;$('total').textContent=r.length;$('gameNo').textContent='GAME '+r.length;$('shoeLabel').textContent='SHOE '+state.shoe;$('pRate').textContent=dec?Math.round(pc/dec*100)+'%':'0%';$('bRate').textContent=dec?Math.round(bc/dec*100)+'%':'0%';const cells=buildRoad();if(!cells.length){$('empty').style.display='flex';$('road').style.display='none'}else{$('empty').style.display='none';$('road').style.display='grid';const mc=Math.max.apply(null,cells.map(c=>c.col))+1,cellSize=window.matchMedia('(orientation:landscape) and (max-height:520px)').matches?40:35;$('road').style.gridTemplateColumns='repeat('+mc+','+cellSize+'px)';$('road').innerHTML=cells.map(c=>'<div class="cell" style="grid-column:'+(c.col+1)+';grid-row:'+(c.row+1)+'"><div class="mark '+(c.value==='P'?'p':'b')+'">'+c.value+'</div>'+(c.ties?'<div class="tie-badge">'+c.ties+'</div>':'')+'</div>').join('');setTimeout(()=>$('roadWrap').scrollLeft=$('roadWrap').scrollWidth,20)}const s=streakInfo();$('currentStreak').textContent=s.current;$('maxStreak').textContent=s.max;$('sequence').innerHTML=r.slice(-40).map(v=>'<div class="seq '+(v==='P'?'p':v==='B'?'b':'t')+'">'+v+'</div>').join('')}function add(v){state.results.push(v);save();render();resetClear();resetShoe();if(navigator.vibrate)navigator.vibrate(18)}$('btnP').onclick=()=>add('P');$('btnB').onclick=()=>add('B');$('btnT').onclick=()=>add('T');$('undo').onclick=()=>{if(state.results.length){state.results.pop();save();render()}resetClear();resetShoe()};$('newShoe').onclick=()=>{if(!shoeArmed){shoeArmed=true;$('newShoe').classList.add('shoe-armed');$('newShoe').textContent='한 번 더 누르기';$('notice').textContent='새 슈를 시작하려면 한 번 더 누르세요.';clearTimeout(shoeTimer);shoeTimer=setTimeout(()=>{resetShoe();$('notice').textContent=''},4000);return}clearTimeout(shoeTimer);state.archive.push({shoe:state.shoe,results:[...state.results],savedAt:new Date().toISOString()});state.shoe+=1;state.results=[];save();render();resetShoe();$('notice').textContent='SHOE '+state.shoe+'가 시작되었습니다.';setTimeout(()=>$('notice').textContent='',1400)};$('clear').onclick=()=>{if(!state.results.length&&state.archive.length===0){$('notice').textContent='삭제할 기록이 없습니다.';return}if(!clearArmed){clearArmed=true;$('clear').classList.add('armed');$('clear').textContent='한 번 더 누르면 삭제';$('notice').textContent='전체 기록을 삭제하려면 한 번 더 누르세요.';clearTimeout(clearTimer);clearTimer=setTimeout(()=>{resetClear();$('notice').textContent=''},3000);return}clearTimeout(clearTimer);state={results:[],shoe:1,archive:[]};save();render();resetClear();resetShoe();$('notice').textContent='전체 기록이 삭제되었습니다.';setTimeout(()=>$('notice').textContent='',1200)};window.addEventListener('resize',()=>setTimeout(render,80));window.addEventListener('orientationchange',()=>setTimeout(render,180));if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=30').then(r=>r.update()).catch(()=>{}))}load();render()})();
</script></body></html>
